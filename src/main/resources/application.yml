spring:
  application:
    name: applicant-tracking-system

  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:10MB}
      max-request-size: ${MAX_UPLOAD_SIZE:10MB}

  datasource:
    url: ${DB_URL:jdbc:mysql://ats-mysql.mysql.database.azure.com:3306/ats}
    username: ${DB_USERNAME:minhhieu}
    password: ${DB_PASSWORD:Admin123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}

ats:
  upload:
    directory: ${UPLOAD_DIR:D:/uploads}
    public-path: /uploads
jwt:
  secret-key: "0fd7c04cb27fd9f9c6ab410fd01931256a6786278deeed72c2cb751388f2fed1"
  access-expiration: 300
  refresh-expiration: 10800