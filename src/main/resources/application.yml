spring:
  application:
    name: applicant-tracking-system

  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE:10MB}
      max-request-size: ${MAX_UPLOAD_SIZE:10MB}

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ats}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

server:
  port: ${SERVER_PORT:8080}

ats:
  upload:
    directory: ${UPLOAD_DIR:D:/uploads}
    public-path: /uploads
